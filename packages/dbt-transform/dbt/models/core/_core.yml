version: 2

models:
  - name: entities
    description: >
      Canonical entity current-state table (plan `04 §1`'s `dim_*` tables,
      generalized): latest-landed payload per (project, schema, entity id).
    columns:
      - name: entity_key
        description: Composite (project_id, schema_name, entity_id) uniqueness key.
        tests:
          - not_null
          - unique
      - name: entity_id
        tests:
          - not_null
      - name: last_seen_at
        tests:
          - not_null

  - name: events
    description: >
      Canonical event fact table (plan `04 §1`'s `fact_funnel_event`,
      generalized): append-only, one row per landed event.
    columns:
      - name: event_id
        tests:
          - not_null
          - unique
      - name: occurred_at
        tests:
          - not_null

  - name: measures
    description: >
      Canonical measure fact table (plan `04 §1`'s `fact_ad_spend`-shaped
      tables, generalized): append-only, one row per landed pre-aggregated
      measure.
    columns:
      - name: measure_id
        tests:
          - not_null
          - unique

  - name: bridge_identity
    description: >
      Deterministic identity stitching (plan `04 §4`, KAN-56): one row per
      resolved anon_id -> customer_id link, with the winning method,
      confidence, and a conflict flag — see the model's own doc comment for
      the full conflict-resolution rule.
    columns:
      - name: bridge_identity_key
        description: Composite (project_id, environment_id, anon_id) uniqueness key.
        tests:
          - not_null
          - unique
      - name: anon_id
        tests:
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: method
        tests:
          - not_null
      - name: confidence
        tests:
          - not_null
      - name: is_conflicted
        tests:
          - not_null
