version: 2

seeds:
  - name: raw_records
    description: >
      Fixture "test dataset" standing in for a real export of KAN-33's
      Firestore `raw_records` collection (itself a stand-in for a partitioned
      BigQuery raw table until KAN-18 provisions one) — enough rows across
      three projects/environments and all three schema kinds to build and
      test the staging/core layers against. `proj_2`'s rows are a synthetic
      anon -> signup -> purchase identity journey (KAN-56's
      `bridge_identity`), not a third unrelated tenant. `proj_10`'s rows are
      a synthetic two-channel touchpoint journey (KAN-58's
      `fact_attribution`: a paid-search touchpoint followed by a paid-social
      one, both resolved to the same customer via a shared device id) —
      isolated from `proj_2`'s own exact-row-count-asserting bridge_identity
      fixture test. `proj_11`'s rows are a synthetic two-cohort signup →
      retention journey (KAN-62's `fact_cohort_retention`: a January cohort
      of 3 customers and a February cohort of 2, with hand-picked return
      activity spanning January–March) — isolated from every other
      project's own exact-row-count-asserting fixture test. `proj_12`'s rows
      are a synthetic 28-day engagement window (KAN-63's `fact_engagement_
      daily`/`fact_engagement_depth_histogram`: four customers with
      deliberately distinct activity-day counts — 10/3/1/6 out of the
      2026-04-01..2026-04-28 window — so both the daily DAU/stickiness table
      and the days-active histogram have hand-computable, mutually distinct
      expected values) — isolated the same way.
    columns:
      - name: organization_id
        tests:
          - not_null
      - name: project_id
        tests:
          - not_null
      - name: environment_id
        tests:
          - not_null
      - name: kind
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['entity', 'event', 'measure']
      - name: schema_name
        tests:
          - not_null
      - name: client_id
        tests:
          - not_null
      - name: landed_at
        tests:
          - not_null
