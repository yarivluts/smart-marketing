version: 2

seeds:
  - name: raw_records
    description: >
      Fixture "test dataset" standing in for a real export of KAN-33's
      Firestore `raw_records` collection (itself a stand-in for a partitioned
      BigQuery raw table until KAN-18 provisions one) — enough rows across
      three projects/environments and all three schema kinds to build and
      test the staging/core layers against. `proj_2`'s rows are a synthetic
      anon -> signup -> purchase identity journey (KAN-56's
      `bridge_identity`), not a third unrelated tenant. `proj_10`'s rows are
      a synthetic two-channel touchpoint journey (KAN-58's
      `fact_attribution`: a paid-search touchpoint followed by a paid-social
      one, both resolved to the same customer via a shared device id) —
      isolated from `proj_2`'s own exact-row-count-asserting bridge_identity
      fixture test.
    columns:
      - name: organization_id
        tests:
          - not_null
      - name: project_id
        tests:
          - not_null
      - name: environment_id
        tests:
          - not_null
      - name: kind
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['entity', 'event', 'measure']
      - name: schema_name
        tests:
          - not_null
      - name: client_id
        tests:
          - not_null
      - name: landed_at
        tests:
          - not_null
