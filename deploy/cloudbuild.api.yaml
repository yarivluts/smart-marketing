# Builds the GrowthOS API image from the monorepo root and pushes it to Artifact Registry.
# Usage: gcloud builds submit --config deploy/cloudbuild.api.yaml --substitutions _IMAGE=<image> .
steps:
  - name: gcr.io/cloud-builders/docker
    args: ['build', '-f', 'apps/api/Dockerfile', '-t', '${_IMAGE}', '.']
images:
  - '${_IMAGE}'
options:
  machineType: 'E2_HIGHCPU_8'
timeout: 1800s
