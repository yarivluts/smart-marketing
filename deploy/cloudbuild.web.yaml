# Builds the GrowthOS web image from the monorepo root and pushes it to Artifact Registry.
# NEXT_PUBLIC_* config is inlined at build time, so each environment gets its own image.
# Usage:
#   gcloud builds submit --config deploy/cloudbuild.web.yaml \
#     --substitutions _IMAGE=<image>,_FIREBASE_API_KEY=...,_FIREBASE_AUTH_DOMAIN=...,_FIREBASE_PROJECT_ID=...,_FIREBASE_APP_ID=...,_API_URL=... .
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - '-f'
      - apps/web/Dockerfile
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=${_FIREBASE_API_KEY}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=${_FIREBASE_APP_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=${_API_URL}'
      - '-t'
      - '${_IMAGE}'
      - '.'
images:
  - '${_IMAGE}'
options:
  machineType: 'E2_HIGHCPU_8'
timeout: 1800s
substitutions:
  _FIREBASE_API_KEY: ''
  _FIREBASE_AUTH_DOMAIN: ''
  _FIREBASE_PROJECT_ID: ''
  _FIREBASE_APP_ID: ''
  _API_URL: ''
